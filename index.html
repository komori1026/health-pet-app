<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>体質改善ペット</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <section id="token-setup" class="hidden">
    <p>初回のみ、health-pet-data用のGitHubアクセストークンを入力してください。</p>
    <input type="password" id="token-input" placeholder="github_pat_...">
    <button id="token-save">保存</button>
    <p id="token-status"></p>
  </section>

  <main id="app" class="hidden">
    <section id="pet-display">
      <img id="pet-image" src="characters/current.png" alt="育成中のペット">
      <p id="pet-stage-name"></p>
      <p id="pet-points"></p>
    </section>

    <section id="calendar">
      <div id="calendar-header">
        <button id="prev-month" type="button">&lt;</button>
        <span id="calendar-month-label"></span>
        <button id="next-month" type="button">&gt;</button>
      </div>
      <div id="calendar-grid"></div>
    </section>

    <section id="day-detail">
      <h2 id="selected-date"></h2>
      <div id="habit-inputs"></div>
    </section>

    <button id="send-btn" type="button" disabled>送信</button>
    <p id="save-status"></p>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
